<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Godressi Music</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- =========================================================
         NAVBAR
    ========================================================= -->
    <header>  
        <nav class="navbar">

            <div class="logo-container">
                <img src="images/logo.png" class="logo-img" alt="logo">
                <h1 class="site-title">Godressi Music</h1>
            </div>

            <div class="menu-toggle" onclick="toggleMenu()">☰</div>

            <ul class="nav-links" id="navLinks">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>

        </nav>
    </header>

    <!-- =========================================================
         HERO SECTION
    ========================================================= -->
    <section class="hero">

        <div class="hero-content">

            <h2>Discover Your Sound</h2>

            <p>Premium instruments for musicians, students, and professionals.</p>

            <a href="javascript:void(0)" class="hero-btn" onclick="scrollToCatalog()">
                Explore Instruments
            </a>

        </div>

    </section>

   <!-- =========================================================
        CATALOG TITLE (NOT STICKY)
    ========================================================= -->
    <section class="catalog-header">
        <h2 class="catalog-title">Browse Instruments</h2>
    </section>


    <!-- =========================================================
        STICKY SEARCH + FILTERS ONLY
    ========================================================= -->
    <section class="sticky-header">

        <div class="search-section">

            <input
                type="text"
                id="search"
                placeholder="Search instruments..."
                onkeyup="searchInstruments(this.value)"
            >

            <div class="categories">
                <button onclick="filterProducts('all', this)">All</button>
                <button onclick="filterProducts('guitar', this)">Guitars</button>
                <button onclick="filterProducts('piano', this)">Pianos</button>
                <button onclick="filterProducts('violin', this)">Violins</button>
                <button onclick="filterProducts('drums', this)">Drums</button>
                <button onclick="filterProducts('oriental', this)">Oriental</button>
                <button onclick="filterProducts('accessories', this)">Wind Instruments</button>
                <button onclick="filterProducts('accessories', this)">Percussions</button>
                <button onclick="filterProducts('accessories', this)">Accessories</button>
            </div>

        </div>

    </section>

    <!-- =========================================================
         CATALOG (NETFLIX STYLE)
    ========================================================= -->
    <section class="catalog-section" id="catalog">

        <div id="catalogRows"></div>

    </section>

    <!-- =========================================================
         FOOTER
    ========================================================= -->
    <footer>
        <p>© 2026 Godressi Music. All rights reserved.</p>
    </footer>

    <!-- =========================================================
         MODAL
    ========================================================= -->
    <div id="productModal" class="modal">

        <div class="modal-content">

            <span class="close-btn" onclick="closeModal()">&times;</span>

            <img id="modalImage" src="" alt="">

            <div class="modal-body">

                <h2 id="modalTitle"></h2>
                <p id="modalDescription"></p>

                <div id="modalColors" class="modal-colors"></div>

            </div>

        </div>

    </div>

    <!-- =========================================================
         SCRIPT
    ========================================================= -->
    <script src="js/script.js"></script>

</body>
</html>
